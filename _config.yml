# ============================================================
# Chirpy 主题配置
# 主题：cotes2020/jekyll-theme-chirpy
# ============================================================
theme: jekyll-theme-chirpy

# ============================================================
# 站点基本信息
# ============================================================
lang: zh-CN
timezone: Asia/Shanghai
title: summerTBD 的博客
tagline: 记录我的学习和生活
description: >-
  summerTBD 的技术博客，记录算法学习与编程思考
url: "https://summerTBD.github.io"
baseurl: ""

# ============================================================
# 主题外观
# ============================================================
theme_mode: light   # light | dark | auto
avatar: ""          # 头像图片 URL

# ============================================================
# 社交链接
# ============================================================
social:
  name: summerTBD
  email: ""
  links:
    - https://github.com/summerTBD

# ============================================================
# 文章相关
# ============================================================
# 文章路径
permalink: /posts/:title/

# 分页
paginate: 10

# 是否显示目录
toc: true

# 评论系统（可选）
comments:
  provider: ""

# ============================================================
# 默认 Front Matter
# ============================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true

# ============================================================
# 插件
# ============================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-redirect-from

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive
    tag: archive
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# ============================================================
# 构建配置
# ============================================================
future: true
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

compress_html:
  clippings: all
  comments: all
  endings: []
  profile: false

sass:
  style: compressed

exclude:
  - .jekyll-cache
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
