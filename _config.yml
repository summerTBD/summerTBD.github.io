# ============================================================
# Minimal Mistakes 主题配置
# 主题：mmistakes/minimal-mistakes
# ============================================================
theme: minimal-mistakes-jekyll

# ============================================================
# 站点基本信息
# ============================================================
locale: zh-CN
title: summerTBD 的博客
title_separator: "|"
subtitle: 记录我的学习和生活
name: summerTBD
description: >-
  summerTBD 的技术博客，记录算法学习与编程思考
url: "https://summerTBD.github.io"
baseurl: ""
repository: "summerTBD/summerTBD.github.io"
teaser: "/assets/images/teaser.jpg"

# ============================================================
# 时间格式
# ============================================================
timezone: Asia/Shanghai

# ============================================================
# 搜索
# ============================================================
search: true
search_provider: lunr

# ============================================================
# 分页
# ============================================================
paginate: 10
paginate_path: /page:num/

# ============================================================
# 阅读时间估算
# ============================================================
words_per_minute: 200

# ============================================================
# 文章参数
# ============================================================
permalink: /posts/:title/

# ============================================================
# 默认 Front Matter
# ============================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true
      toc_sticky: true
      permalink: /posts/:title/
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# ============================================================
# 导航栏 - 顶部主菜单
# ============================================================
include: ["_pages"]

# ============================================================
# 分类/标签归档
# ============================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ============================================================
# Jekyll 插件
# ============================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# ============================================================
# 构建配置
# ============================================================
future: true

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  math_engine: mathjax

  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - Gemfile
  - Gemfile.lock

# ============================================================
# 作者信息
# ============================================================
author:
  name: "summerTBD"
  avatar: "/assets/images/avatar.jpg"
  bio: "算法学习者 · 编程爱好者"
  location: "中国"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/summerTBD"

# ============================================================
# 页脚链接
# ============================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/summerTBD"

# ============================================================
# 评论系统 (可选的：disqus, discourse, facebook, staticman)
# ============================================================
comments:
  provider: false # 暂时关闭，如需启用改为 disqus 等
  disqus:
    shortname: ""
