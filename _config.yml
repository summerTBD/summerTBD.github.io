# ============================================================
# Chirpy 主题配置 (v7.x)
# 主题：cotes2020/jekyll-theme-chirpy
# ============================================================
theme: jekyll-theme-chirpy

# ============================================================
# 站点基本信息
# ============================================================
lang: zh-CN
timezone: Asia/Shanghai
title: summerTBD 的博客
tagline: 记录我的学习和生活
description: >-
  summerTBD 的技术博客，记录算法学习与编程思考
url: "https://summerTBD.github.io"
baseurl: ""

# ============================================================
# 主题外观
# ============================================================
theme_mode: light   # light | dark | auto
avatar: ""

# ============================================================
# 社交链接
# ============================================================
social:
  name: summerTBD
  email: ""
  links:
    - https://github.com/summerTBD

# ============================================================
# 文章参数
# ============================================================
permalink: /posts/:title/
paginate: 10

# ============================================================
# 默认 Front Matter
# ============================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true

# ============================================================
# 构建配置
# ============================================================
future: true

# Chirpy 会自动处理插件，不需要手动声明
# markdown, kramdown, sass 等 Chirpy 也会自动配置
